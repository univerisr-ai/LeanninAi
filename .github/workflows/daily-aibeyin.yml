name: Daily AiBeyin Brain Run

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry Run (Sadece test, wiki değişmez)'
        required: false
        default: false
        type: boolean
      force_run:
        description: 'Manuel Tetikleme'
        required: false
        default: true
        type: boolean

jobs:
  run-daily-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        env:
          PYTHONPATH: src
        run: |
          python -m unittest discover -s tests -v

      - name: Run pipeline
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_GPT4O_MINI_DEPLOYMENT: ${{ secrets.AZURE_GPT4O_MINI_DEPLOYMENT }}
          AZURE_KIMI_DEPLOYMENT: ${{ secrets.AZURE_KIMI_DEPLOYMENT }}
          PYTHONPATH: src
        run: |
          if [ "${{ github.event.inputs.dry_run }}" == "true" ]; then
            python scripts/run_pipeline.py --config config/pipeline.json --dry-run
          else
            python scripts/run_pipeline.py --config config/pipeline.json
          fi

      - name: Commit generated updates
        run: |
          git config user.name "aibeyin-bot"
          git config user.email "aibeyin-bot@users.noreply.github.com"
          git add wiki/ storage/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No generated changes"
          else
            git commit -m "chore: daily ai beyin run"
            git push
          fi
